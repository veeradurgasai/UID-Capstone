document.addEventListener("DOMContentLoaded", () => {
    const sessionData = sessionStorage.getItem("f4_session");
    const navLinks = document.querySelector(".b");
    const logoTitle = document.getElementById("n");

    if (sessionData) {
        const user = JSON.parse(sessionData);
        logoTitle.innerText = "HELLO, " + user.user.toUpperCase();
        
        // Replace Login link with Logout link
        const loginLink = document.querySelector('a[href="log.html"]');
        if (loginLink) {
            loginLink.innerText = "LOGOUT";
            loginLink.href = "#";
            loginLink.onclick = () => {
                sessionStorage.removeItem("f4_session");
                location.reload();
            };
        }
    }
});

// STRICTURE REFRESH RULE: Content goes away on refresh
